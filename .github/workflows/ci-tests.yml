name: CI Tests

on:
  push:
    branches: [main, develop, feature/nf-test]
  pull_request:
    branches: [main, develop, feature/nf-test]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Setup Nextflow latest-edge
        uses: nf-core/setup-nextflow@v1
        with:
          version: "latest-edge"

      - name: Setup nf-test 0.9.2
        uses: nf-core/setup-nf-test@v1
        with:
          version: 0.9.2
          install-pdiff: true


      - name: Run Tests
        run: nf-test test --ci --tag=local
